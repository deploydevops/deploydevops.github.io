---
layout: default
---

<article>
    <div class="post-header">
        <h1>{{ page.title }}</h1>
        <div class="meta">
            {{ page.date | date: "%B %d, %Y" }}
            {% if page.read_time %} &middot; {{ page.read_time }} min read{% endif %}
        </div>
        <div class="tags" style="margin-top: 0.5rem;">
            {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
        </div>
    </div>

    <div class="post-content">
        {{ content }}
    </div>

    <div class="post-footer">
        <div class="cta">
            <p>Want more? Follow <a href="https://instagram.com/deploydevops">@deploydevops</a> for terminal tips.</p>
            <div class="social-links" style="margin-top: 1rem;">
                <a href="https://www.youtube.com/@DeployDevOps">YouTube</a>
                <a href="https://tiktok.com/@deploydevops">TikTok</a>
                <a href="https://instagram.com/deploydevops">Instagram</a>
                <a href="https://www.linkedin.com/company/deploydevops">LinkedIn</a>
            </div>
        </div>
    </div>
</article>
