<!DOCTYPE html>

<head>

    <title>DeployDevOps</title>
    <style>

        body { background: #0d1117; color: #e6edf3; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .links a { color: #00d4ff; text-decoration: none; padding: 0.5rem 1rem; border: 1px solid #30363d; border-radius: 6px; transition: border-color 0.2s; }

        .social a { color: #8b949e; text-decoration: none; font-size: 0.9rem; }
